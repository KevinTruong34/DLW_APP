<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Chuyển hàng — DLW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface-2: #f5f3ee;
    --surface-3: #efece4;
    --ink: #1a1815;
    --ink-2: #4a463e;
    --ink-3: #8a8478;
    --line: #e8e5dd;
    --line-2: #efece4;

    --accent: oklch(0.56 0.11 250);
    --accent-hover: oklch(0.51 0.11 250);
    --accent-soft: oklch(0.96 0.025 250);

    --emerald: oklch(0.56 0.11 165);
    --emerald-soft: oklch(0.96 0.025 165);
    --emerald-ink: oklch(0.4 0.11 165);

    --amber: oklch(0.7 0.13 75);
    --amber-soft: oklch(0.96 0.04 80);
    --amber-ink: oklch(0.45 0.13 75);

    --sky: oklch(0.62 0.1 230);
    --sky-soft: oklch(0.96 0.025 230);
    --sky-ink: oklch(0.42 0.1 230);

    --rose: oklch(0.62 0.16 22);
    --rose-soft: oklch(0.97 0.03 22);
    --rose-ink: oklch(0.45 0.13 22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: 'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    font-size: 13px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'DM Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .num  { font-variant-numeric: tabular-nums; }

  .header { padding: 18px 24px 14px; border-bottom: 1px solid var(--line); background: var(--surface); flex-shrink: 0; }
  .header-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .sub { font-size: 12.5px; color: var(--ink-3); margin: 2px 0 0; }

  .btn {
    height: 34px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--surface); color: var(--ink);
    font: inherit; font-weight: 500; cursor: pointer;
    transition: background .12s, border-color .12s, color .12s;
    display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  .btn:hover { background: var(--surface-2); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-emerald { background: var(--emerald); border-color: var(--emerald); color: #fff; }
  .btn-emerald:hover { background: oklch(0.51 0.11 165); border-color: oklch(0.51 0.11 165); }
  .btn-danger { color: var(--rose); }
  .btn-danger:hover { background: var(--rose-soft); border-color: var(--rose); color: var(--rose); }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 12.5px; border-radius: 6px; }
  .btn-icon { width: 32px; padding: 0; justify-content: center; }
  .btn[disabled] { opacity: .5; cursor: not-allowed; }

  .input, .select {
    height: 34px; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--surface); font: inherit; color: var(--ink); outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  .input:focus, .select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .input::placeholder { color: var(--ink-3); }
  .search { padding-left: 34px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238a8478' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>"); background-repeat: no-repeat; background-position: 12px center; }

  .filterbar { display: flex; gap: 8px; align-items: center; padding: 14px 24px; border-bottom: 1px solid var(--line); background: var(--surface); flex-shrink: 0; }

  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 500; background: var(--surface-2); color: var(--ink-2); white-space: nowrap; }
  .pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .85; }
  .pill-tam     { background: var(--amber-soft);  color: var(--amber-ink); }
  .pill-go      { background: var(--sky-soft);    color: var(--sky-ink); }
  .pill-done    { background: var(--emerald-soft);color: var(--emerald-ink); }
  .pill-cancel  { background: var(--rose-soft);   color: var(--rose-ink); }
  .pill-arch    { background: var(--surface-3); color: var(--ink-3); }
  .pill-arch::before { display: none; }
  .pill-arch { padding: 2px 8px; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }

  .day-label { font-size: 11px; font-weight: 700; color: var(--ink-3); letter-spacing: 0.08em; margin: 18px 4px 8px; text-transform: uppercase; }
  .day-label:first-child { margin-top: 0; }

  .tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .tbl th { text-align: left; font-weight: 500; color: var(--ink-3); padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--surface); position: sticky; top: 0; z-index: 1; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .tbl td { padding: 12px 14px; border-bottom: 1px solid var(--line-2); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr { cursor: pointer; transition: background .1s; }
  .tbl tbody tr:hover { background: var(--surface-2); }
  .tbl tbody tr.selected { background: var(--accent-soft); }
  .tbl tbody tr.selected td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
  .row-arrow { opacity: 0; transition: opacity .12s, transform .12s; color: var(--ink-3); }
  .tbl tbody tr:hover .row-arrow { opacity: 1; }
  .tbl tbody tr.selected .row-arrow { opacity: 1; color: var(--accent); transform: translateX(2px); }

  .branch-flow { display: inline-flex; align-items: center; gap: 6px; }
  .branch-from { color: var(--sky-ink); font-weight: 500; }
  .branch-to   { color: var(--emerald-ink); font-weight: 500; }
  .branch-arrow { color: var(--ink-3); }

  .money { font-family: 'DM Mono', monospace; font-variant-numeric: tabular-nums; font-weight: 500; }
  .money .currency { color: var(--ink-3); margin-left: 2px; font-weight: 400; }

  .stage { position: relative; flex: 1; overflow: hidden; background: var(--bg); }
  .list-wrap { height: 100%; overflow: auto; padding: 18px 24px 28px; }

  .summary-strip { display: flex; gap: 18px; padding: 4px 0 14px; }
  .summary-cell { font-size: 12px; color: var(--ink-3); }
  .summary-cell .v { display: block; font-size: 16px; font-weight: 600; color: var(--ink); margin-top: 2px; }
  .summary-cell.divide { padding-left: 18px; border-left: 1px solid var(--line); }

  .backdrop {
    position: absolute; inset: 0; background: rgba(20,18,15,0.18);
    transition: opacity .2s; z-index: 5;
  }
  .drawer {
    position: absolute; top: 0; right: 0; bottom: 0; width: 600px; max-width: 92%;
    background: var(--surface); border-left: 1px solid var(--line);
    box-shadow: -16px 0 40px rgba(20,18,15,0.10);
    transform: translateX(100%);
    transition: transform .26s cubic-bezier(.2,.7,.3,1);
    display: flex; flex-direction: column; z-index: 6;
  }
  .drawer.lg { width: 760px; }
  .drawer.open { transform: translateX(0); }

  .drawer-head { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
  .drawer-meta { padding: 12px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; border-bottom: 1px solid var(--line); background: var(--surface-2); flex-shrink: 0; }
  .drawer-body { flex: 1; overflow: auto; padding: 16px 20px; }
  .drawer-foot { padding: 12px 20px; border-top: 1px solid var(--line); display: flex; gap: 8px; background: var(--surface); flex-shrink: 0; }

  .ticket-tag { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; padding: 2px 7px; background: var(--surface-2); border-radius: 5px; color: var(--ink-2); }

  .meta-cell { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; }
  .meta-cell .meta-icon { color: var(--ink-3); margin-top: 2px; flex-shrink: 0; }
  .meta-cell .meta-label { font-size: 11px; color: var(--ink-3); }
  .meta-cell .meta-value { font-size: 12.5px; color: var(--ink); }

  .section-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

  .item-line { display: grid; grid-template-columns: 1fr 70px 70px 100px; gap: 10px; align-items: center; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }
  .item-line + .item-line { margin-top: 6px; }
  .item-line .it-name { font-size: 13px; font-weight: 500; }
  .item-line .it-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .item-line .num-cell { text-align: right; font-family: 'DM Mono', monospace; font-variant-numeric: tabular-nums; }
  .item-line .num-cell .lbl { display: block; font-size: 10.5px; font-weight: 500; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.04em; font-family: 'Be Vietnam Pro', sans-serif; margin-bottom: 2px; }
  .item-line.diff .num-cell .v.short { color: var(--rose); }

  .note-block { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; font-size: 12.5px; color: var(--ink-2); }
  .note-block .lbl { display: block; font-size: 11px; color: var(--ink-3); margin-bottom: 3px; font-weight: 500; }

  .check-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; cursor: pointer; }
  .check-row input { margin: 0; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11.5px; font-weight: 500; color: var(--ink-2); }
  .field-label .req { color: var(--rose); margin-left: 2px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  textarea.input { height: auto; padding: 10px 12px; resize: vertical; min-height: 64px; font-family: inherit; }

  .cart-row { display: grid; grid-template-columns: 1fr 90px 110px 28px; gap: 10px; align-items: center; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }
  .cart-row.over { border-color: var(--rose); background: var(--rose-soft); }
  .cart-row + .cart-row { margin-top: 6px; }
  .cart-row .nm { font-size: 13px; font-weight: 500; }
  .cart-row .mc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .cart-row .ton { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .cart-row .ton.over { color: var(--rose); font-weight: 600; }
  .cart-row .gia { text-align: right; font-family: 'DM Mono', monospace; font-variant-numeric: tabular-nums; font-size: 12px; color: var(--ink-2); }
  .ie-remove { width: 28px; height: 28px; border: none; background: transparent; color: var(--ink-3); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .ie-remove:hover { background: var(--rose-soft); color: var(--rose); }

  .sug-list { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow: auto; }
  .sug-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 8px 10px; border-radius: 8px; }
  .sug-row:hover { background: var(--surface-2); }
  .sug-row.added { opacity: .6; }
  .sug-row .nm { font-size: 13px; font-weight: 500; }
  .sug-row .meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .sug-row .price { font-family: 'DM Mono', monospace; font-variant-numeric: tabular-nums; color: var(--emerald-ink); font-size: 12px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(20,18,15,0.32); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .18s; }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }
  .modal { width: 100%; max-width: 480px; background: var(--surface); border-radius: 14px; box-shadow: 0 24px 64px rgba(20,18,15,0.18), 0 0 0 1px var(--line); overflow: hidden; transform: translateY(8px) scale(.98); transition: transform .22s cubic-bezier(.2,.7,.3,1); }
  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
  .modal-head { padding: 18px 20px 12px; }
  .modal-title { font-size: 16px; font-weight: 600; margin: 0; }
  .modal-sub { font-size: 12.5px; color: var(--ink-3); margin: 2px 0 0; }
  .modal-body { padding: 4px 20px 16px; }
  .modal-foot { padding: 12px 20px; border-top: 1px solid var(--line); background: var(--surface-2); display: flex; gap: 8px; justify-content: flex-end; }

  .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 60; pointer-events: none; }
  .toast { display: inline-flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--ink); color: #fafaf6; border-radius: 10px; box-shadow: 0 12px 32px rgba(20,18,15,0.22); font-size: 13px; font-weight: 500; transform: translateY(12px); opacity: 0; transition: transform .22s, opacity .22s; pointer-events: auto; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast .toast-icon { width: 18px; height: 18px; border-radius: 50%; background: var(--emerald); display: inline-flex; align-items: center; justify-content: center; color: #fff; }

  .empty { padding: 60px 20px; text-align: center; color: var(--ink-3); font-size: 13px; }
  .empty .empty-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--surface-2); display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3); margin-bottom: 12px; }
  .kbd { display: inline-flex; padding: 1px 6px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-3); font-size: 11px; font-family: 'DM Mono', monospace; }

  .scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: #d6d2c7; border-radius: 4px; }
  .scroll::-webkit-scrollbar-thumb:hover { background: #c0bca8; }
  .scroll::-webkit-scrollbar-track { background: transparent; }

  .edit-banner { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--amber-soft); border-bottom: 1px solid var(--line); color: var(--amber-ink); font-size: 12px; font-weight: 500; }
  .edit-banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); }

  /* Pagination */
  .pager { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 0 4px; }
  .pager-info { font-size: 12px; color: var(--ink-3); }
</style>
</head>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
// ─── Streamlit bridge ─────────────────────────────────────────
// Tự cài đặt protocol để giao tiếp với Streamlit parent qua postMessage.
// Tham khảo: streamlit-component-lib (simplified inline).
const Streamlit = (() => {
  const RENDER_EVENT = "streamlit:render";
  const eventTarget = new EventTarget();
  let lastValue = undefined;

  function _send(type, data) {
    window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
  }

  function setComponentReady() {
    _send("streamlit:componentReady", { apiVersion: 1 });
  }

  function setFrameHeight(h) {
    _send("streamlit:setFrameHeight", { height: h });
  }

  function setComponentValue(v) {
    lastValue = v;
    _send("streamlit:setComponentValue", { value: v, dataType: "json" });
  }

  function onMessage(ev) {
    const t = ev.data?.type;
    if (t === "streamlit:render") {
      const detail = { args: ev.data.args || {}, disabled: ev.data.disabled, theme: ev.data.theme };
      const e = new CustomEvent(RENDER_EVENT, { detail });
      eventTarget.dispatchEvent(e);
    }
  }

  window.addEventListener("message", onMessage);

  return {
    RENDER_EVENT,
    events: eventTarget,
    setComponentReady,
    setFrameHeight,
    setComponentValue,
  };
})();

// ─── helpers ──────────────────────────────────────────────────
function fmtMoney(n) { return (Number(n)||0).toLocaleString('vi-VN'); }
function fmtMoneyShort(n) {
  n = Number(n) || 0;
  if (n >= 1_000_000) return (n/1_000_000).toFixed(2) + ' tr đ';
  return n.toLocaleString('vi-VN') + ' đ';
}
function dayLabelFor(_date, todayStr, yestStr) {
  if (!_date) return '';
  if (_date === todayStr) return 'Hôm nay';
  if (_date === yestStr)  return 'Hôm qua';
  const [yy,mm,dd] = _date.split('-');
  const d = new Date(+yy, +mm-1, +dd);
  const w = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'][d.getDay()];
  return `${w}, ${dd}/${mm}/${yy}`;
}
function totalQty(items)  { return (items||[]).reduce((s,i)=>s+(+i.qty||0),0); }
function totalRecv(items) { return (items||[]).reduce((s,i)=>s+(+i.recv||0),0); }
function totalGia(items)  { return (items||[]).reduce((s,i)=>s+((+i.qty||0)*(+i.gia||0)),0); }
function statusPillCls(s) {
  if (s === 'Phiếu tạm')   return 'pill-tam';
  if (s === 'Đang chuyển') return 'pill-go';
  if (s === 'Đã nhận')     return 'pill-done';
  if (s === 'Đã hủy')      return 'pill-cancel';
  return '';
}
function todayStr() {
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate()-1);
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function Icon({ name, size=14 }) {
  const paths = {
    search:  <><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></>,
    x:       <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
    chevron: <path d="m9 18 6-6-6-6"/>,
    chevronD:<path d="m6 9 6 6 6-6"/>,
    plus:    <><path d="M12 5v14"/><path d="M5 12h14"/></>,
    refresh: <><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></>,
    user:    <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
    truck:   <><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></>,
    check:   <path d="M20 6 9 17l-5-5"/>,
    branch:  <><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></>,
    clock:   <><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></>,
    pkg:     <><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.27 6.96 8.73 5.05 8.73-5.05"/><path d="M12 22.08V12"/></>,
    inbox:   <><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></>,
    edit:    <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></>,
    trash:   <><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
    arrowR:  <><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
      {paths[name]}
    </svg>
  );
}

const PERIODS  = ['Tháng này', 'Tháng trước', 'Tất cả'];
const STATUSES = ['Tất cả', 'Phiếu tạm', 'Đang chuyển', 'Đã nhận', 'Đã hủy'];
const PER_PAGE = 20;

function applyFilters(rows, { query, status, branch, period, firstMonth, firstLast }) {
  const q = (query||'').trim().toLowerCase();
  return rows.filter(r => {
    if (period === 'Tháng này' && (!r._date || r._date < firstMonth)) return false;
    if (period === 'Tháng trước') {
      // Đầu tháng trước ≤ r._date < đầu tháng này
      if (!r._date || r._date < firstLast || r._date >= firstMonth) return false;
    }
    if (status !== 'Tất cả' && r.status !== status) return false;
    if (branch !== 'Tất cả' && r.from !== branch && r.to !== branch) return false;
    if (q) {
      const items = r.items || [];
      const hay = `${r.id} ${r.from} ${r.to} ${r.creator} ${r.receiver} ${r.note} ${r.noteRecv} ${items.map(i=>i.name+' '+i.ma).join(' ')}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ─── App ──────────────────────────────────────────────────────
function App({ props }) {
  const {
    tickets = [], branches = [], accessible_branches = [],
    active_branch = '', is_admin = false, current_user = '',
    hang_hoa = [], the_kho_by_branch = {},
    first_month_iso = '', first_last_iso = '',
  } = props;

  const [period, setPeriod]   = React.useState('Tháng này');
  const [branch, setBranch]   = React.useState('Tất cả');
  const [status, setStatus]   = React.useState('Tất cả');
  const [query, setQuery]     = React.useState('');
  const [openId, setOpenId]   = React.useState(null);
  const [showCreate, setShowCreate] = React.useState(false);
  const [editingId, setEditingId]   = React.useState(null);
  const [confirmAction, setConfirmAction] = React.useState(null);
  const [receivingId, setReceivingId] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [page, setPage] = React.useState(0);

  const tStr = todayStr();
  const yStr = yesterdayStr();

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2400); };

  const rows = React.useMemo(
    () => applyFilters(tickets, {
      query, status, branch, period,
      firstMonth: first_month_iso, firstLast: first_last_iso,
    }),
    [tickets, query, status, branch, period, first_month_iso, first_last_iso]
  );
  const open = rows.find(t => t.id === openId) || tickets.find(t => t.id === openId) || null;

  // Reset page khi filter đổi
  React.useEffect(() => { setPage(0); }, [query, status, branch, period]);

  // Pagination
  const totalPages = Math.max(1, Math.ceil(rows.length / PER_PAGE));
  const safePage   = Math.min(page, totalPages - 1);
  const pageStart  = safePage * PER_PAGE;
  const pageRows   = rows.slice(pageStart, pageStart + PER_PAGE);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key !== 'Escape') return;
      if (confirmAction) setConfirmAction(null);
      else if (receivingId) setReceivingId(null);
      else if (editingId)   setEditingId(null);
      else if (showCreate)  setShowCreate(false);
      else if (openId)      setOpenId(null);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [openId, showCreate, editingId, receivingId, confirmAction]);

  const grouped = React.useMemo(() => {
    const m = new Map();
    pageRows.forEach(r => { if (!m.has(r._date)) m.set(r._date, []); m.get(r._date).push(r); });
    return [...m.entries()].sort((a,b)=>b[0].localeCompare(a[0]));
  }, [pageRows]);

  // Aggregate metrics
  const totalCount = rows.length;
  const totalSL = rows.reduce((s,r)=>s+totalQty(r.items),0);
  const totalGT = rows.reduce((s,r)=>s+totalGia(r.items),0);

  const filterActive = query || status !== 'Tất cả' || branch !== 'Tất cả' || period !== 'Tháng này';

  // Branch options theo accessible
  const branchOpts = accessible_branches.length ? accessible_branches : branches;

  // Emit event lên Python
  const emit = (event) => {
    Streamlit.setComponentValue({ ...event, nonce: Date.now() + Math.random() });
  };

  // Action handlers
  const handleConfirmTransfer = (id) => {
    emit({ action: 'confirm_transfer', id });
    showToast(`Đang xác nhận chuyển hàng cho phiếu ${id}...`);
  };
  const handleReceive = (id, receiver) => {
    emit({ action: 'receive', id, receiver });
    showToast(`Đang nhận hàng cho phiếu ${id}...`);
    setReceivingId(null);
  };
  const handleCancel = (id) => {
    emit({ action: 'cancel', id });
    showToast(`Đang hủy phiếu ${id}...`);
    setConfirmAction(null);
    setOpenId(null);
  };
  const handleReload = () => {
    emit({ action: 'reload' });
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <div className="header">
        <div className="header-row">
          <div>
            <h1 className="h1">Chuyển hàng</h1>
            <p className="sub">Quản lý phiếu chuyển kho giữa các chi nhánh · Đang xem từ <b style={{color:'var(--ink-2)'}}>{active_branch}</b></p>
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button className="btn" onClick={handleReload}><Icon name="refresh" size={13}/> Tải lại</button>
          </div>
        </div>
      </div>

      <div className="filterbar">
        <div style={{ position: 'relative', flex: 1, maxWidth: 360 }}>
          <input className="input search" style={{ width: '100%' }}
                 placeholder="Tìm mã phiếu, sản phẩm, người tạo..."
                 value={query} onChange={e => setQuery(e.target.value)} />
        </div>
        <select className="select" value={period} onChange={e => setPeriod(e.target.value)}>
          {PERIODS.map(p => <option key={p}>{p}</option>)}
        </select>
        <select className="select" value={branch} onChange={e => setBranch(e.target.value)}>
          <option>Tất cả</option>
          {branchOpts.map(b => <option key={b}>{b}</option>)}
        </select>
        <select className="select" value={status} onChange={e => setStatus(e.target.value)}>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        {filterActive && (
          <button className="btn btn-ghost btn-sm" onClick={() => { setQuery(''); setStatus('Tất cả'); setBranch('Tất cả'); setPeriod('Tháng này'); }}>
            Đặt lại
          </button>
        )}
        <div style={{ flex: 1 }}/>
        <button className="btn btn-primary" onClick={() => setShowCreate(true)}>
          <Icon name="plus" size={13}/> Tạo phiếu chuyển
        </button>
      </div>

      <div className="stage">
        <div className="list-wrap scroll">
          <div className="summary-strip">
            <div className="summary-cell">
              <span>Số phiếu trong kỳ</span>
              <span className="v num">{totalCount}</span>
            </div>
            <div className="summary-cell divide">
              <span>Tổng số lượng</span>
              <span className="v num">{totalSL.toLocaleString('vi-VN')}</span>
            </div>
            <div className="summary-cell divide">
              <span>Tổng giá trị</span>
              <span className="v mono">{fmtMoneyShort(totalGT)}</span>
            </div>
          </div>

          {rows.length === 0 ? (
            <div className="card">
              <div className="empty">
                <div className="empty-icon"><Icon name="inbox" size={20}/></div>
                <div style={{ fontSize: 14, color: 'var(--ink-2)', fontWeight: 500, marginBottom: 4 }}>Không có phiếu trong kỳ này</div>
                <div>Thử đổi bộ lọc, hoặc tạo phiếu mới.</div>
              </div>
            </div>
          ) : grouped.map(([dt, list]) => (
            <React.Fragment key={dt}>
              <div className="day-label">{dayLabelFor(dt, tStr, yStr)}</div>
              <div className="card" style={{ overflow: 'hidden', marginBottom: 4 }}>
                <table className="tbl">
                  <colgroup>
                    <col style={{ width: 110 }}/>
                    <col style={{ width: 110 }}/>
                    <col/>
                    <col style={{ width: 130 }}/>
                    <col style={{ width: 140 }}/>
                    <col style={{ width: 130 }}/>
                    <col style={{ width: 140 }}/>
                    <col style={{ width: 36 }}/>
                  </colgroup>
                  <thead>
                    <tr>
                      <th>Mã phiếu</th>
                      <th>Giờ</th>
                      <th>Chi nhánh</th>
                      <th>Mặt hàng</th>
                      <th style={{ textAlign:'right' }}>Giá trị</th>
                      <th>Người tạo</th>
                      <th>Trạng thái</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {list.map(t => {
                      const items = t.items || [];
                      const timeStr = (t.date || '').split(' ')[1] || '';
                      return (
                        <tr key={t.id}
                            className={openId === t.id ? 'selected' : ''}
                            onClick={() => setOpenId(t.id)}>
                          <td className="mono" style={{ fontWeight: 500 }}>{t.id}</td>
                          <td className="mono" style={{ color:'var(--ink-3)', fontSize: 12 }}>{timeStr}</td>
                          <td>
                            <span className="branch-flow">
                              <span className="branch-from">{t.from}</span>
                              <span className="branch-arrow"><Icon name="arrowR" size={12}/></span>
                              <span className="branch-to">{t.to}</span>
                            </span>
                          </td>
                          <td style={{ color:'var(--ink-2)' }}>
                            <span className="num">{items.length}</span> mục · <span className="num">{totalQty(items)}</span> SL
                          </td>
                          <td style={{ textAlign:'right' }}><span className="money">{fmtMoneyShort(totalGia(items))}</span></td>
                          <td style={{ color: 'var(--ink-2)' }}>{t.creator}</td>
                          <td>
                            <span className={`pill ${statusPillCls(t.status)}`}>{t.status}</span>
                            {t.archived && t.status !== 'Đã hủy' && (
                              <span className="pill pill-arch" style={{ marginLeft: 4 }}>Kết sổ</span>
                            )}
                          </td>
                          <td style={{ textAlign:'right', paddingRight: 14 }}>
                            <span className="row-arrow"><Icon name="chevron" size={14}/></span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </React.Fragment>
          ))}

          {totalPages > 1 && (
            <div className="pager">
              <button className="btn btn-sm" disabled={safePage === 0}
                      onClick={() => setPage(p => Math.max(0, p-1))}>← Trước</button>
              <span className="pager-info">
                Trang <b style={{color:'var(--ink)'}}>{safePage+1}</b>/{totalPages} · {pageStart+1}–{Math.min(pageStart+PER_PAGE, rows.length)} / {rows.length} phiếu
              </span>
              <button className="btn btn-sm" disabled={safePage >= totalPages-1}
                      onClick={() => setPage(p => Math.min(totalPages-1, p+1))}>Sau →</button>
            </div>
          )}
        </div>

        <div className="backdrop"
             onClick={() => setOpenId(null)}
             style={{ opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none' }}/>
        <aside className={`drawer ${open ? 'open' : ''}`} aria-hidden={!open}>
          {open && (
            <DetailDrawer
              ticket={open}
              activeBranch={active_branch}
              isAdmin={is_admin}
              onClose={() => setOpenId(null)}
              onEdit={() => setEditingId(open.id)}
              onConfirmTransfer={() => handleConfirmTransfer(open.id)}
              onStartReceive={() => setReceivingId(open.id)}
              onCancel={() => setConfirmAction({ kind:'cancel', id: open.id })}
            />
          )}
        </aside>
      </div>

      <CreateEditDrawer
        open={showCreate || !!editingId}
        ticket={editingId ? tickets.find(t=>t.id===editingId) : null}
        branches={branches}
        activeBranch={active_branch}
        currentUser={current_user}
        hangHoa={hang_hoa}
        theKhoByBranch={the_kho_by_branch}
        isAdmin={is_admin}
        onClose={() => { setShowCreate(false); setEditingId(null); }}
        onSave={(payload, isEdit, editId) => {
          if (isEdit) {
            emit({ action: 'update', id: editId, payload });
            showToast(`Đang cập nhật phiếu ${editId}...`);
            setEditingId(null);
          } else {
            emit({ action: 'create', payload });
            showToast(`Đang tạo phiếu mới...`);
            setShowCreate(false);
          }
        }}
      />

      <ReceiveModal
        open={!!receivingId}
        ticket={tickets.find(t=>t.id===receivingId) || null}
        currentUser={current_user}
        onClose={() => setReceivingId(null)}
        onConfirm={(receiver) => handleReceive(receivingId, receiver)}
      />

      <ConfirmDialog
        open={!!confirmAction}
        title="Hủy phiếu chuyển?"
        message={confirmAction && (() => {
          const t = tickets.find(x => x.id === confirmAction.id);
          if (!t) return '';
          if (t.status === 'Đang chuyển') return `Phiếu ${t.id} đang chuyển. Hủy phiếu sẽ hoàn lại tồn kho cho ${t.from}.`;
          return `Hủy phiếu ${t.id}? Thao tác này không thể hoàn tác.`;
        })()}
        confirmLabel="Hủy phiếu"
        danger
        onCancel={() => setConfirmAction(null)}
        onConfirm={() => handleCancel(confirmAction.id)}
      />

      <Toast message={toast}/>
    </div>
  );
}

// ─── Detail drawer ────────────────────────────────────────────
function DetailDrawer({ ticket, activeBranch, isAdmin, onClose, onEdit, onConfirmTransfer, onStartReceive, onCancel }) {
  const items = ticket.items || [];
  const totSL  = totalQty(items);
  const totRcv = totalRecv(items);
  const totGT  = totalGia(items);

  const canEditOrConfirm = ticket.status === 'Phiếu tạm' && activeBranch === ticket.from;
  const canReceive       = ticket.status === 'Đang chuyển' && activeBranch === ticket.to;
  const canCancel        = isAdmin && ticket.status !== 'Đã nhận' && ticket.status !== 'Đã hủy';

  let helper = null;
  if (ticket.status === 'Phiếu tạm' && activeBranch !== ticket.from)
    helper = `Để sửa hoặc xác nhận, đổi sang chi nhánh ${ticket.from}`;
  else if (ticket.status === 'Đang chuyển' && activeBranch !== ticket.to)
    helper = `Để nhận phiếu này, đổi sang chi nhánh ${ticket.to}`;
  else if (ticket.status === 'Đã nhận') helper = 'Phiếu đã hoàn tất.';
  else if (ticket.status === 'Đã hủy')  helper = 'Phiếu đã hủy.';

  return (
    <>
      <div className="drawer-head">
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, flexWrap:'wrap' }}>
            <span className="ticket-tag">{ticket.id}</span>
            <span className={`pill ${statusPillCls(ticket.status)}`}>{ticket.status}</span>
            {ticket.archived && ticket.status !== 'Đã hủy' && <span className="pill pill-arch">Kết sổ</span>}
          </div>
          <div style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.3, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <span style={{ color:'var(--sky-ink)' }}>{ticket.from}</span>
            <Icon name="arrowR" size={14}/>
            <span style={{ color:'var(--emerald-ink)' }}>{ticket.to}</span>
          </div>
          <div style={{ fontSize: 12.5, color:'var(--ink-3)', marginTop: 2 }} className="mono">
            {ticket.date}
          </div>
        </div>
        <div style={{ display:'flex', gap: 4 }}>
          {canEditOrConfirm && (
            <button className="btn btn-ghost btn-sm btn-icon" title="Sửa phiếu" onClick={onEdit}>
              <Icon name="edit" size={13}/>
            </button>
          )}
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onClose} title="Đóng (Esc)">
            <Icon name="x" size={14}/>
          </button>
        </div>
      </div>

      <div className="drawer-meta">
        <Meta icon="user"  label="Người gửi/tạo"  value={ticket.creator || <span style={{color:'var(--ink-3)'}}>—</span>}/>
        <Meta icon="user"  label="Người nhận"     value={ticket.receiver || <span style={{color:'var(--ink-3)'}}>Chưa nhận</span>}/>
        <Meta icon="pkg"   label="Số mặt hàng"    value={<span className="num">{items.length}</span>}/>
        <Meta icon="truck" label="Tổng SL"        value={<span className="num">{totSL.toLocaleString('vi-VN')}</span>}/>
      </div>

      <div className="drawer-body scroll">
        {ticket.note && (
          <div className="note-block" style={{ marginBottom: 14 }}>
            <span className="lbl">Ghi chú chuyển</span>
            {ticket.note}
          </div>
        )}
        {ticket.noteRecv && (
          <div className="note-block" style={{ marginBottom: 14 }}>
            <span className="lbl">Ghi chú nhận</span>
            {ticket.noteRecv}
          </div>
        )}

        <div className="section-label">
          <Icon name="pkg" size={12}/>
          <span>Danh sách hàng chuyển</span>
          <span style={{ marginLeft:'auto', fontWeight:400, color:'var(--ink-3)', textTransform:'none', letterSpacing:0 }}>
            {items.length} mục · {fmtMoneyShort(totGT)}
          </span>
        </div>

        <div>
          {items.map((it, i) => {
            const showRecv = ticket.status === 'Đã nhận' || ticket.status === 'Đang chuyển' || ticket.status === 'Đã hủy';
            const isShort = showRecv && it.recv < it.qty && ticket.status === 'Đã nhận';
            return (
              <div key={i} className={`item-line ${isShort ? 'diff' : ''}`}>
                <div style={{ minWidth: 0 }}>
                  <div className="it-name">{it.name}</div>
                  <div className="it-code">{it.ma}</div>
                </div>
                <div className="num-cell">
                  <span className="lbl">SL chuyển</span>
                  <span className="v num">{it.qty}</span>
                </div>
                <div className="num-cell">
                  <span className="lbl">SL nhận</span>
                  <span className={`v num ${isShort?'short':''}`}>
                    {showRecv ? it.recv : <span style={{color:'var(--ink-3)'}}>—</span>}
                  </span>
                </div>
                <div className="num-cell">
                  <span className="lbl">Thành tiền</span>
                  <span className="v money">{fmtMoney(it.qty * it.gia)}<span style={{color:'var(--ink-3)',fontWeight:400,marginLeft:2}}>đ</span></span>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ marginTop: 16, padding: '12px 14px', background:'var(--surface-2)', borderRadius: 10, display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <div>
            <div style={{ fontSize: 11.5, color:'var(--ink-3)' }}>Tổng giá trị</div>
            <div style={{ fontSize: 11.5, color:'var(--ink-3)', marginTop: 4 }}>SL: <span className="num">{totSL}</span> {ticket.status === 'Đã nhận' && totRcv !== totSL && (<>· nhận <span className="num" style={{color:'var(--rose)'}}>{totRcv}</span></>)}</div>
          </div>
          <div style={{ fontSize: 22, fontWeight: 600 }} className="money">
            {fmtMoney(totGT)}<span style={{ color:'var(--ink-3)', fontWeight: 400, marginLeft: 2 }}>đ</span>
          </div>
        </div>

        {helper && !canEditOrConfirm && !canReceive && !canCancel && (
          <div style={{ marginTop: 14, fontSize: 12, color: 'var(--ink-3)', textAlign:'center' }}>
            {helper}
          </div>
        )}

        <div style={{ marginTop: 16, fontSize: 11.5, color: 'var(--ink-3)', textAlign:'center' }}>
          Nhấn <span className="kbd">Esc</span> hoặc click ngoài để đóng
        </div>
      </div>

      <div className="drawer-foot">
        {canEditOrConfirm && (
          <>
            <button className="btn" onClick={onEdit}><Icon name="edit" size={13}/> Sửa phiếu</button>
            <button className="btn btn-primary" style={{ flex: 1 }} onClick={onConfirmTransfer}>
              <Icon name="truck" size={13}/> Xác nhận chuyển hàng
            </button>
          </>
        )}
        {canReceive && (
          <button className="btn btn-emerald" style={{ flex: 1 }} onClick={onStartReceive}>
            <Icon name="check" size={13}/> Nhận hàng
          </button>
        )}
        {canCancel && !canEditOrConfirm && !canReceive && (
          <button className="btn btn-danger" style={{ flex: 1 }} onClick={onCancel}>
            <Icon name="trash" size={13}/> Hủy phiếu
          </button>
        )}
        {canCancel && (canEditOrConfirm || canReceive) && (
          <button className="btn btn-danger btn-icon" title="Hủy phiếu" onClick={onCancel}>
            <Icon name="trash" size={13}/>
          </button>
        )}
        {!canEditOrConfirm && !canReceive && !canCancel && (
          <button className="btn" style={{ flex: 1 }} onClick={onClose}>Đóng</button>
        )}
      </div>
    </>
  );
}

function Meta({ icon, label, value }) {
  return (
    <div className="meta-cell">
      <span className="meta-icon"><Icon name={icon} size={12}/></span>
      <div style={{ minWidth: 0 }}>
        <div className="meta-label">{label}</div>
        <div className="meta-value">{value}</div>
      </div>
    </div>
  );
}

// ─── Create / Edit drawer ─────────────────────────────────────
function CreateEditDrawer({ open, ticket, branches, activeBranch, currentUser, hangHoa, theKhoByBranch, isAdmin, onClose, onSave }) {
  const isEdit = !!ticket;
  const [form, setForm] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [onlyStock, setOnlyStock] = React.useState(true);

  React.useEffect(() => {
    if (!open) return;
    const initialItems = ticket ? (ticket.items || []).map(i=>({
      ma: i.ma, name: i.name, qty: i.qty, recv: i.recv, gia: i.gia
    })) : [];
    setForm({
      from: ticket?.from || activeBranch,
      to: ticket?.to || '',
      creator: ticket?.creator || currentUser || '',
      note: ticket?.note || '',
      items: initialItems,
    });
    setSearch('');
  }, [open, ticket?.id]);

  if (!form) return (
    <>
      <div className="backdrop" onClick={onClose}
           style={{ opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', position:'fixed', zIndex: 30 }}/>
      <aside className={`drawer lg ${open ? 'open' : ''}`}
             style={{ position: 'fixed', zIndex: 31 }} aria-hidden={!open}/>
    </>
  );

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const setItem  = (i, patch) => setForm(f => ({ ...f, items: f.items.map((it,idx) => idx === i ? { ...it, ...patch } : it) }));
  const addItem  = (h) => setForm(f => f.items.some(it=>it.ma===h.ma) ? f : ({ ...f, items: [...f.items, { ma:h.ma, name:h.name, qty:1, recv:0, gia:h.gia }] }));
  const removeItem = (i) => setForm(f => ({ ...f, items: f.items.filter((_,idx) => idx !== i) }));

  const totSL = form.items.reduce((s,i)=>s+(+i.qty||0),0);
  const totGT = form.items.reduce((s,i)=>s+(+i.qty||0)*(+i.gia||0),0);

  // Stock map theo chi nhánh `from`
  const stockMap = theKhoByBranch[form.from] || {};

  // Suggestion list
  const filteredHH = React.useMemo(() => {
    let list = hangHoa.map(h => ({
      ma: h.ma, name: h.name, gia: h.gia, ton: stockMap[h.ma] || 0
    }));
    if (onlyStock) list = list.filter(h => h.ton > 0);
    const q = search.trim().toLowerCase();
    if (q) {
      const qn = q.replace(/[\s\-_./]/g, '');
      list = list.filter(h => {
        const hay = `${h.ma} ${h.name}`.toLowerCase().replace(/[\s\-_./]/g, '');
        return hay.includes(qn);
      });
    }
    return list.slice(0, 8);
  }, [search, onlyStock, hangHoa, stockMap]);

  const hasOverflow = form.items.some(it => (+it.qty||0) > (stockMap[it.ma] ?? 0));
  const sameBranch = form.from === form.to;
  const canSave = form.items.length > 0 && form.creator.trim() && !sameBranch && !hasOverflow && form.to;

  const handleSave = () => {
    if (!canSave) return;
    const payload = {
      tu_chi_nhanh:  form.from,
      toi_chi_nhanh: form.to,
      nguoi_tao:     form.creator.trim(),
      ghi_chu:       form.note.trim(),
      items: form.items.filter(i => +i.qty > 0).map(i => ({
        ma_hang:  i.ma,
        ten_hang: i.name,
        so_luong: +i.qty,
        gia_ban:  +i.gia,
      })),
    };
    onSave(payload, isEdit, ticket?.id);
  };

  // Tu chi nhanh options: admin được chọn tất cả, không phải admin chỉ active_branch
  const tuOptions = isEdit ? [form.from] : (isAdmin ? branches : [activeBranch]);

  return (
    <>
      <div className="backdrop" onClick={onClose}
           style={{ opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', position:'fixed', zIndex: 30 }}/>
      <aside className={`drawer lg ${open ? 'open' : ''}`}
             style={{ position: 'fixed', zIndex: 31 }} aria-hidden={!open}>
        <div className="drawer-head">
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 17, fontWeight: 600 }}>
              {isEdit ? `Cập nhật phiếu ${ticket.id}` : 'Tạo phiếu chuyển hàng'}
            </div>
            <div style={{ fontSize: 12.5, color: 'var(--ink-3)', marginTop: 2 }}>
              {isEdit ? 'Sửa thông tin và danh sách mặt hàng. Phiếu sẽ ở trạng thái Phiếu tạm.' : 'Chọn chi nhánh nguồn → đích và thêm mặt hàng vào giỏ.'}
            </div>
          </div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onClose} title="Đóng (Esc)">
            <Icon name="x" size={14}/>
          </button>
        </div>

        {isEdit && (
          <div className="edit-banner">
            <span className="dot"/> Đang sửa phiếu — thay đổi chỉ áp dụng khi bấm Lưu.
          </div>
        )}

        <div className="drawer-body scroll" style={{ display:'flex', flexDirection:'column', gap: 14 }}>
          <div className="field-grid">
            <div className="field">
              <label className="field-label">Từ chi nhánh<span className="req">*</span></label>
              <select className="select" value={form.from}
                      onChange={e => { const v = e.target.value; setForm(f => ({ ...f, from: v, to: f.to === v ? '' : f.to })); }}
                      disabled={isEdit}>
                {tuOptions.map(b => <option key={b}>{b}</option>)}
              </select>
            </div>
            <div className="field">
              <label className="field-label">Đến chi nhánh<span className="req">*</span></label>
              <select className="select" value={form.to} onChange={e => setField('to', e.target.value)} disabled={isEdit}>
                <option value="">— Chọn chi nhánh —</option>
                {branches.filter(b => b !== form.from).map(b => <option key={b}>{b}</option>)}
              </select>
            </div>
          </div>
          <div className="field-grid">
            <div className="field">
              <label className="field-label">Người gửi/tạo phiếu<span className="req">*</span></label>
              <input className="input" value={form.creator} onChange={e => setField('creator', e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label">Ghi chú chuyển</label>
              <input className="input" value={form.note} onChange={e => setField('note', e.target.value)}
                     placeholder="VD: Chuyển bổ sung hàng tuần..."/>
            </div>
          </div>

          <div style={{ height: 1, background:'var(--line)', margin: '4px 0' }}/>

          <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
            <div className="section-label" style={{ marginBottom: 0 }}>
              <Icon name="pkg" size={12}/>
              <span>Giỏ hàng ({form.items.length} sản phẩm)</span>
            </div>
            <div style={{ marginLeft:'auto', fontSize: 12, color:'var(--ink-3)' }} className="mono">
              SL <b style={{color:'var(--ink)'}} className="num">{totSL}</b> · GT <b style={{color:'var(--ink)'}}>{fmtMoneyShort(totGT)}</b>
            </div>
          </div>

          {form.items.length === 0 ? (
            <div style={{ padding: '20px 12px', border:'1px dashed var(--line)', borderRadius: 10, color:'var(--ink-3)', fontSize: 12.5, textAlign:'center' }}>
              Giỏ hàng trống. Tìm và thêm sản phẩm ở danh sách bên dưới.
            </div>
          ) : (
            <div>
              {form.items.map((it, i) => {
                const ton = stockMap[it.ma] ?? 0;
                const over = +it.qty > ton;
                return (
                  <div key={i} className={`cart-row ${over?'over':''}`}>
                    <div style={{ minWidth: 0 }}>
                      <div className="nm">{it.name}</div>
                      <div className="mc">{it.ma}</div>
                      <div className={`ton ${over?'over':''}`}>
                        Tồn nguồn: <span className="num">{ton}</span>{over && ' · ⚠ vượt tồn'}
                      </div>
                    </div>
                    <input className="input num" type="number" min="1" max="99999"
                           value={it.qty}
                           style={{ textAlign:'right' }}
                           onChange={e => setItem(i, { qty: Math.max(1, Number(e.target.value) || 1) })}/>
                    <div className="gia">{fmtMoney(it.qty * it.gia)} đ</div>
                    <button className="ie-remove" onClick={() => removeItem(i)} title="Xóa"><Icon name="x" size={14}/></button>
                  </div>
                );
              })}
            </div>
          )}

          {hasOverflow && (
            <div style={{ padding: '10px 14px', background:'var(--rose-soft)', border:'1px solid var(--rose)', borderRadius: 10, color:'var(--rose-ink)', fontSize: 12.5 }}>
              ⚠ Một số sản phẩm có SL chuyển vượt tồn nguồn. Sửa lại trước khi lưu.
            </div>
          )}
          {sameBranch && (
            <div style={{ padding: '10px 14px', background:'var(--rose-soft)', border:'1px solid var(--rose)', borderRadius: 10, color:'var(--rose-ink)', fontSize: 12.5 }}>
              ⚠ Chi nhánh nguồn và đích phải khác nhau.
            </div>
          )}

          <div style={{ height: 1, background:'var(--line)', margin: '4px 0' }}/>
          <div className="section-label" style={{ marginBottom: 0 }}>
            <Icon name="search" size={12}/>
            <span>Thêm sản phẩm</span>
            <label style={{ marginLeft:'auto', display:'inline-flex', alignItems:'center', gap: 6, fontSize: 12, color:'var(--ink-2)', textTransform:'none', letterSpacing:0, fontWeight:400 }}>
              <input type="checkbox" checked={onlyStock} onChange={e => setOnlyStock(e.target.checked)}/>
              Chỉ hàng còn tồn ở nguồn
            </label>
          </div>
          <input className="input search" placeholder="Tìm sản phẩm theo mã, tên..."
                 value={search} onChange={e => setSearch(e.target.value)}/>
          <div className="sug-list">
            {filteredHH.length === 0 ? (
              <div style={{ padding: 12, color:'var(--ink-3)', fontSize: 12.5, textAlign:'center' }}>
                Không tìm thấy sản phẩm phù hợp.
              </div>
            ) : filteredHH.map(h => {
              const added = form.items.some(it => it.ma === h.ma);
              return (
                <div key={h.ma} className={`sug-row ${added?'added':''}`}>
                  <div style={{ minWidth: 0 }}>
                    <div className="nm">{h.name}</div>
                    <div className="meta">{h.ma} · Tồn: <span className="num">{h.ton}</span></div>
                  </div>
                  <div className="price">{fmtMoney(h.gia)}đ</div>
                  {added ? (
                    <span style={{ fontSize: 11.5, color:'var(--emerald-ink)' }}>✓ Đã thêm</span>
                  ) : (
                    <button className="btn btn-sm" onClick={() => addItem(h)}>
                      <Icon name="plus" size={12}/> Thêm
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div className="drawer-foot">
          <button className="btn" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" style={{ flex: 1 }} disabled={!canSave} onClick={handleSave}>
            {isEdit ? 'Lưu thay đổi' : 'Tạo phiếu chuyển'}
          </button>
        </div>
      </aside>
    </>
  );
}

// ─── Receive modal ────────────────────────────────────────────
function ReceiveModal({ open, ticket, currentUser, onClose, onConfirm }) {
  const [receiver, setReceiver] = React.useState(currentUser || '');
  const [confirmed, setConfirmed] = React.useState(false);

  React.useEffect(() => {
    if (open) { setConfirmed(false); setReceiver(currentUser || ''); }
  }, [open, ticket?.id, currentUser]);

  const items = ticket?.items || [];
  const totSL = totalQty(items);

  return (
    <div className={`modal-backdrop ${open?'open':''}`} onClick={onClose}>
      <div className="modal" style={{ maxWidth: 520 }} onClick={e => e.stopPropagation()}>
        {ticket && (<>
          <div className="modal-head">
            <h3 className="modal-title">Nhận hàng</h3>
            <p className="modal-sub">
              Phiếu <span className="mono" style={{ color:'var(--ink)' }}>{ticket.id}</span> ·{' '}
              <span style={{ color:'var(--sky-ink)' }}>{ticket.from}</span>{' '}<Icon name="arrowR" size={11}/>{' '}
              <span style={{ color:'var(--emerald-ink)' }}>{ticket.to}</span>
            </p>
          </div>
          <div className="modal-body">
            <div style={{ padding: '10px 12px', background:'var(--surface-2)', borderRadius: 8, marginBottom: 14, display:'flex', justifyContent:'space-between', fontSize: 12.5 }}>
              <span style={{ color:'var(--ink-3)' }}>Tổng SL chuyển</span>
              <span className="num" style={{ fontWeight: 600 }}>{totSL}</span>
            </div>
            <div className="field" style={{ marginBottom: 12 }}>
              <label className="field-label">Người nhận<span className="req">*</span></label>
              <input className="input" value={receiver} onChange={e => setReceiver(e.target.value)}
                     placeholder="Tên người nhận hàng"/>
            </div>
            <label className="check-row">
              <input type="checkbox" checked={confirmed} onChange={e => setConfirmed(e.target.checked)}/>
              <span style={{ fontSize: 12.5 }}>Tôi xác nhận đã kiểm tra và nhận đủ hàng</span>
            </label>
          </div>
          <div className="modal-foot">
            <button className="btn" onClick={onClose}>Hủy</button>
            <button className="btn btn-emerald" disabled={!confirmed || !receiver.trim()}
                    onClick={() => onConfirm(receiver.trim())}>
              <Icon name="check" size={13}/> Xác nhận nhận hàng
            </button>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ─── Confirm dialog ───────────────────────────────────────────
function ConfirmDialog({ open, title, message, confirmLabel='OK', danger, onCancel, onConfirm }) {
  return (
    <div className={`modal-backdrop ${open?'open':''}`} onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3 className="modal-title">{title}</h3>
        </div>
        <div className="modal-body">
          <p style={{ margin: 0, fontSize: 13, color:'var(--ink-2)' }}>{message}</p>
        </div>
        <div className="modal-foot">
          <button className="btn" onClick={onCancel}>Đóng</button>
          <button className={`btn ${danger?'btn-danger':'btn-primary'}`} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Toast ────────────────────────────────────────────────────
function Toast({ message }) {
  return (
    <div className="toast-wrap">
      <div className={`toast ${message?'show':''}`}>
        <span className="toast-icon"><Icon name="check" size={11}/></span>
        <span>{message}</span>
      </div>
    </div>
  );
}

// ─── Streamlit lifecycle ──────────────────────────────────────
function Root() {
  const [props, setProps] = React.useState(null);

  React.useEffect(() => {
    const onRender = (event) => {
      setProps(event.detail.args || {});
    };
    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(900);
    return () => Streamlit.events.removeEventListener(Streamlit.RENDER_EVENT, onRender);
  }, []);

  if (!props) return null;
  return <App props={props}/>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<Root/>);
</script>
</body>
</html>
