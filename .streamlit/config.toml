[server]
# Watch tất cả file (kể cả trong subfolder modules/, utils/) bằng poll mode.
# Mặc định Streamlit dùng inotify chỉ watch app.py — không nhận file trong subfolder.
fileWatcherType = "poll"

# Tự rerun app khi phát hiện file thay đổi
runOnSave = true

[theme]
# Force light theme bất kể system OS — không cho browser apply prefers-color-scheme: dark
base = "light"
