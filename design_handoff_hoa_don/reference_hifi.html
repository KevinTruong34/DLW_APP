<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>hoa_don.py — Hi-fi redesign · 3 phương án</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ────────────────────────────────────────────────────────────
     DESIGN TOKENS — same family as hang_hoa.css (prefix --hd-*)
     ──────────────────────────────────────────────────────────── */
  :root{
    --hd-bg:        #f7f7f8;
    --hd-surface:   #ffffff;
    --hd-surface-2: #fafafa;
    --hd-surface-3: #f3f3f5;
    --hd-border:    #e7e7ea;
    --hd-border-2:  #d8d8dc;
    --hd-ink:       #18181b;
    --hd-ink-2:     #3f3f46;
    --hd-ink-3:     #71717a;
    --hd-ink-4:     #a1a1aa;

    --hd-accent:      #e63946;
    --hd-accent-d:    #c1121f;
    --hd-accent-soft: #fdecee;

    --hd-good:        #1a7f37;
    --hd-good-soft:   #e6f4ea;
    --hd-warn:        #cf4c2c;
    --hd-warn-soft:   #fdecec;
    --hd-info:        #2563eb;
    --hd-info-soft:   #e7efff;
    --hd-purple:      #7c3aed;
    --hd-purple-soft: #f1e9ff;
    --hd-amber:       #b45309;
    --hd-amber-soft:  #fef3c7;
    --hd-zero:        #a1a1aa;

    --hd-radius:    10px;
    --hd-radius-sm: 6px;
    --hd-shadow-sm: 0 1px 2px rgba(24,24,27,.04), 0 0 0 1px var(--hd-border);
    --hd-shadow-md: 0 4px 14px -2px rgba(24,24,27,.08), 0 0 0 1px var(--hd-border);
    --hd-shadow-lg: 0 18px 48px -12px rgba(24,24,27,.22), 0 0 0 1px var(--hd-border);

    --hd-font:  'Be Vietnam Pro', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --hd-mono:  'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }

  /* canvas page chrome */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#f0eee9;color:var(--hd-ink);font-family:var(--hd-font);font-size:14px;-webkit-font-smoothing:antialiased}

  /* ── Streamlit-like wrapper around each variation ───────────── */
  .stl-app{
    background:var(--hd-bg);
    font-family:var(--hd-font);
    color:var(--hd-ink);
    width:100%; height:100%;
    overflow:auto;
    padding:18px 22px 80px;
  }
  .stl-app .stl-h1{
    font-size:22px; font-weight:600; letter-spacing:-.2px;
    margin:0 0 16px;
  }
  .stl-mono{font-family:var(--hd-mono)}

  /* simulate st.container(border=True) */
  .st-container{
    background:var(--hd-surface);
    border:1px solid var(--hd-border);
    border-radius:var(--hd-radius);
    padding:12px 14px;
  }
  .st-container--flat{
    background:transparent; border:1px solid var(--hd-border);
    border-radius:var(--hd-radius); padding:10px 12px;
  }

  /* simulate st.text_input */
  .st-input{
    display:flex; align-items:center; gap:8px;
    height:36px; padding:0 12px;
    background:var(--hd-surface);
    border:1px solid var(--hd-border);
    border-radius:var(--hd-radius-sm);
    font-size:13px; color:var(--hd-ink);
    transition:border-color .12s;
  }
  .st-input:focus-within{border-color:var(--hd-ink)}
  .st-input input{
    flex:1; border:none; outline:none; font:inherit; background:transparent;
    color:inherit;
  }
  .st-input input::placeholder{color:var(--hd-ink-4)}
  .st-input .kbd{
    font-family:var(--hd-mono); font-size:11px; color:var(--hd-ink-3);
    background:var(--hd-surface-2); border:1px solid var(--hd-border);
    padding:1px 6px; border-radius:4px;
  }

  /* simulate st.selectbox */
  .st-select{
    display:inline-flex; align-items:center; gap:8px;
    height:36px; padding:0 10px 0 12px;
    background:var(--hd-surface);
    border:1px solid var(--hd-border);
    border-radius:var(--hd-radius-sm);
    font-size:13px; color:var(--hd-ink);
    cursor:pointer;
  }
  .st-select .caret{color:var(--hd-ink-3); font-size:10px}
  .st-select .lbl{color:var(--hd-ink-3); font-size:11.5px}

  /* simulate st.button */
  .st-btn{
    display:inline-flex; align-items:center; gap:6px;
    height:36px; padding:0 14px;
    background:var(--hd-surface);
    border:1px solid var(--hd-border);
    border-radius:var(--hd-radius-sm);
    font:500 13px var(--hd-font);
    color:var(--hd-ink); cursor:pointer;
    transition:background .12s, border-color .12s;
  }
  .st-btn:hover{background:var(--hd-surface-2); border-color:var(--hd-border-2)}
  .st-btn.primary{
    background:var(--hd-accent); color:#fff; border-color:var(--hd-accent);
  }
  .st-btn.primary:hover{background:var(--hd-accent-d); border-color:var(--hd-accent-d)}
  .st-btn.ghost{ background:transparent; border-color:transparent }
  .st-btn.ghost:hover{background:var(--hd-surface-2)}
  .st-btn.icon{ width:36px; padding:0; justify-content:center }

  /* chip */
  .chip{
    display:inline-flex; align-items:center; gap:5px;
    height:28px; padding:0 11px;
    border-radius:999px;
    background:var(--hd-surface-2);
    border:1px solid var(--hd-border);
    color:var(--hd-ink-2);
    font-size:12.5px; font-weight:500;
    cursor:pointer;
    transition:background .12s, border-color .12s, color .12s;
    white-space:nowrap;
  }
  .chip:hover{ background:var(--hd-surface); border-color:var(--hd-border-2) }
  .chip.active{
    background:var(--hd-ink); border-color:var(--hd-ink); color:#fff;
  }
  .chip.brand.active{
    background:var(--hd-accent); border-color:var(--hd-accent); color:#fff;
  }
  .chip .x{
    width:14px;height:14px;border-radius:50%;
    background:rgba(255,255,255,.22);
    display:inline-grid;place-items:center;
    font-size:10px; line-height:1;
    margin-right:-3px;
  }

  /* segmented control */
  .seg{
    display:inline-flex; padding:3px;
    background:var(--hd-surface-3); border:1px solid var(--hd-border);
    border-radius:8px; gap:2px;
  }
  .seg button{
    appearance:none; border:0; background:transparent;
    padding:5px 12px; font:500 12.5px var(--hd-font);
    color:var(--hd-ink-3); cursor:pointer; border-radius:6px;
    display:inline-flex; align-items:center; gap:6px;
  }
  .seg button:hover{ color:var(--hd-ink-2) }
  .seg button.on{
    background:var(--hd-surface); color:var(--hd-ink);
    box-shadow:0 1px 2px rgba(24,24,27,.06), 0 0 0 1px var(--hd-border);
  }
  .seg .count{
    font-family:var(--hd-mono); font-size:11px; color:var(--hd-ink-4);
    padding:0 4px; border-radius:3px; background:var(--hd-surface-2);
  }
  .seg .on .count{ background:var(--hd-surface-3); color:var(--hd-ink-3) }

  /* badges */
  .badge{
    display:inline-flex; align-items:center; gap:4px;
    height:20px; padding:0 8px;
    font-size:11px; font-weight:600;
    border-radius:999px;
    letter-spacing:.1px;
  }
  .badge--ok{ background:var(--hd-good-soft); color:var(--hd-good) }
  .badge--cancel{ background:var(--hd-warn-soft); color:var(--hd-warn) }
  .badge--return{ background:var(--hd-purple-soft); color:var(--hd-purple) }
  .badge--repair{ background:var(--hd-amber-soft); color:var(--hd-amber) }
  .badge--debt{ background:#fff8e0; color:#8a6d00 }
  .badge--pos{ background:var(--hd-info-soft); color:var(--hd-info) }

  .dot{
    width:6px; height:6px; border-radius:50%; display:inline-block;
  }

  /* pay icons (subtle) */
  .pay{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:5px;
    font-family:var(--hd-mono); font-size:11px; font-weight:600;
    border:1px solid var(--hd-border);
  }
  .pay--cash{ background:#e8f5ea; color:#1a7f37; border-color:#cce8d3 }
  .pay--ck  { background:#eef3ff; color:#2563eb; border-color:#d4ddf9 }
  .pay--card{ background:#fff1e3; color:#a8530b; border-color:#f8dcb2 }
  .pay--vi  { background:#f4eafd; color:#7c3aed; border-color:#e3d2f5 }

  /* metric cards (stats strip) */
  .metric{
    background:var(--hd-surface);
    border:1px solid var(--hd-border);
    border-radius:var(--hd-radius);
    padding:11px 13px;
    box-shadow:var(--hd-shadow-sm);
  }
  .metric .lbl{
    font-size:11px; font-weight:600; letter-spacing:.4px;
    text-transform:uppercase; color:var(--hd-ink-3);
  }
  .metric .val{
    font-family:var(--hd-mono); font-size:20px; font-weight:600;
    letter-spacing:-.4px; color:var(--hd-ink); margin-top:2px;
  }
  .metric .sub{
    font-size:11.5px; color:var(--hd-ink-3); margin-top:3px;
    display:flex; align-items:center; gap:6px;
  }
  .delta--up{ color:var(--hd-good) }
  .delta--down{ color:var(--hd-warn) }

  /* table-ish list */
  table.invlist{
    width:100%; border-collapse:separate; border-spacing:0;
    font-size:13px;
  }
  table.invlist thead th{
    text-align:left;
    font-size:11px; font-weight:600; letter-spacing:.4px;
    text-transform:uppercase; color:var(--hd-ink-3);
    padding:8px 10px;
    border-bottom:1px solid var(--hd-border);
    background:var(--hd-surface-2);
    position:sticky; top:0;
  }
  table.invlist tbody td{
    padding:9px 10px; border-bottom:1px solid var(--hd-border);
    vertical-align:middle;
  }
  table.invlist tbody tr{ transition:background .08s }
  table.invlist tbody tr:hover{ background:var(--hd-surface-2); cursor:pointer }
  table.invlist tbody tr.sel{
    background:var(--hd-accent-soft);
    box-shadow:inset 3px 0 0 var(--hd-accent);
  }
  table.invlist tbody tr.sel:hover{ background:#fbe1e3 }
  td.num{ text-align:right; font-family:var(--hd-mono); font-weight:500 }
  td.code{ font-family:var(--hd-mono); font-size:12px; color:var(--hd-ink-2) }
  td.muted{ color:var(--hd-ink-3) }
  td .twoline{ display:flex; flex-direction:column; line-height:1.25 }
  td .twoline .secondary{ font-size:11.5px; color:var(--hd-ink-3); font-family:var(--hd-font) }
  td .name{ font-weight:500 }

  /* avatar pill (NV bán) */
  .nv{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12.5px; color:var(--hd-ink-2);
  }
  .nv .av{
    width:22px; height:22px; border-radius:50%;
    display:inline-grid; place-items:center;
    color:#fff; font-size:10.5px; font-weight:600;
    letter-spacing:-.1px;
  }
  .av--1{ background:#e63946 }
  .av--2{ background:#2563eb }
  .av--3{ background:#7c3aed }
  .av--4{ background:#1a7f37 }
  .av--5{ background:#a8530b }

  /* tiny dot pip (mini-bar) */
  .pip-bar{
    display:flex; align-items:flex-end; gap:2px; height:24px;
  }
  .pip-bar span{
    flex:1 1 0; background:var(--hd-border-2); border-radius:2px;
    min-height:3px;
    display:block;
  }
  .pip-bar span.hl{ background:var(--hd-accent) }

  /* simulate st.dialog (drawer) */
  .drawer{
    position:absolute; top:0; right:0; bottom:0;
    width:440px;
    background:var(--hd-surface);
    border-left:1px solid var(--hd-border);
    box-shadow:-18px 0 40px -18px rgba(0,0,0,.18);
    z-index:30;
    overflow-y:auto;
    padding:18px 18px 24px;
  }

  /* utilities */
  .row{ display:flex; gap:8px; align-items:center }
  .row.wrap{ flex-wrap:wrap }
  .grow{ flex:1 }
  .stack{ display:flex; flex-direction:column; gap:8px }
  .between{ display:flex; align-items:center; justify-content:space-between }
  .muted{ color:var(--hd-ink-3) }
  .small{ font-size:12px }
  .dim{ color:var(--hd-ink-4) }
  hr.div{ border:0; border-top:1px solid var(--hd-border); margin:10px 0 }

  /* scrollbar style for inner panels */
  .scroll-y{ overflow-y:auto }
  .scroll-y::-webkit-scrollbar{ width:8px; height:8px }
  .scroll-y::-webkit-scrollbar-thumb{ background:#dadadd; border-radius:4px }
  .scroll-y::-webkit-scrollbar-track{ background:transparent }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
